version: "3.9"
services:
  db:
    image: postgres:16
    container_name: fortress-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - fortress_data:/var/lib/postgresql/data

volumes:
  fortress_data:
